<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>开始游戏</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      max-width: 520px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #222;
    }

    p {
      margin: 0 0 24px;
      color: #666;
      font-size: 16px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #888;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>欢迎开始游戏</h1>
    <p>为什么这么简短，因为我不是作者</p>
    <button onclick="startGame()">开始游戏</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function startGame() {
      const statusEl = document.getElementById('status');
      statusEl.textContent = '正在开始游戏...';

      try {
        await STscript(`/sendas`);

        statusEl.textContent = '游戏已开始。';
      } catch (e) {
        console.error('开始游戏执行失败:', e);
        statusEl.textContent = '开始游戏失败，请查看控制台。';
      }
    }
  </script>
</body>
</html>
